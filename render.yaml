services:
  - type: web
    name: teen-finance-guidance
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "backend.app:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: backend.app
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
