<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Path - Teen Finance Guidance</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .learning-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(59, 130, 246, 0.1));
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat-xp { color: #f59e0b; }
        .stat-streak { color: #f97316; }

        .path-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            position: relative;
        }

        .tier-section {
            width: 100%;
            max-width: 600px;
            margin-bottom: 3rem;
            position: relative;
        }

        .tier-header {
            text-align: center;
            margin-bottom: 2rem;
            position: sticky;
            top: 20px;
            z-index: 10;
        }

        .tier-title {
            display: inline-block;
            background: rgba(15, 23, 42, 0.9);
            padding: 0.8rem 2rem;
            border-radius: 30px;
            border: 2px solid #3b82f6;
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tier-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .nodes-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3.5rem;
            position: relative;
        }

        /* SVG Path Line connecting nodes */
        .path-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%);
            z-index: 1;
        }

        .path-node {
            position: relative;
            z-index: 2;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }

        /* Alternating zig-zag effect */
        .node-wrapper:nth-child(even) .path-node {
            transform: translateX(40px);
        }
        .node-wrapper:nth-child(odd) .path-node {
            transform: translateX(-40px);
        }

        .node-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .node-label {
            position: absolute;
            top: 90px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
            background: rgba(15, 23, 42, 0.8);
            padding: 4px 10px;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .node-wrapper:hover .node-label {
            opacity: 1;
        }

        /* Node States */
        img.node-icon {
            width: 40px; 
            height: 40px;
        }

        .path-node.completed {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: 4px solid #fffbeb;
            color: white;
            box-shadow: 0 8px 0 #b45309, 0 15px 20px rgba(245, 158, 11, 0.3);
        }

        .path-node.completed i {
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .path-node.unlocked {
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border: 4px solid white;
            color: white;
            box-shadow: 0 8px 0 #6d28d9, 0 15px 20px rgba(59, 130, 246, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .path-node.locked {
            background: #cbd5e1;
            border: 4px solid #f1f5f9;
            color: #94a3b8;
            box-shadow: 0 8px 0 #94a3b8;
            cursor: not-allowed;
            filter: grayscale(100%);
            opacity: 0.6;
        }

        .path-node:active:not(.locked) {
            transform: translateY(8px) !important;
            box-shadow: 0 0 0 rgba(0,0,0,0) !important;
        }

        /* Connecting line modifications based on state */
        .node-wrapper.completed ~ .node-wrapper.unlocked::before {
            content: '';
            position: absolute;
            top: -60px;
            left: 50%;
            width: 4px;
            height: 60px;
            background: #f59e0b;
            transform: translateX(-50%);
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0px) translateX(var(--tx)); }
            50% { transform: translateY(-10px) translateX(var(--tx)); }
            100% { transform: translateY(0px) translateX(var(--tx)); }
        }

        .ai-generator-panel {
            margin-top: 4rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #3b82f6;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .ai-generator-panel::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(59, 130, 246, 0.3), transparent);
            animation: spin 4s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .panel-content {
            position: relative;
            z-index: 1;
        }

        .ai-input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
    </style>
</head>

<body>
    <nav class="nav-bar">
        <div class="logo" onclick="window.location.href='/dashboard'">
            <i class="fas fa-rocket"></i>
            Teen<span>Finance</span>
        </div>
        <a href="/dashboard" class="btn btn-secondary btn-sm" style="text-decoration: none;">
            <i class="fas fa-arrow-left"></i> Hub
        </a>
    </nav>

    <main class="layout-container" style="display: flex; justify-content: center; padding-bottom: 5rem;">
        <div style="width: 100%; max-width: 800px;">
            
            <div class="learning-header">
                <h1 style="font-size: 2.2rem; font-weight: 800; color: white;">Your Mastery Path</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Learn, earn XP, and level up your financial future.</p>
                
                <div class="stats-bar" id="stats-container">
                    <div class="stat-item stat-xp"><i class="fas fa-bolt"></i> <span>0 XP</span></div>
                    <div class="stat-item stat-streak"><i class="fas fa-fire"></i> <span>0 Days</span></div>
                </div>
            </div>

            <div class="path-container" id="path-root">
                <!-- Dynamically populated path nodes -->
                <div style="text-align: center; color: white; padding: 2rem;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
            </div>
            
            <div style="display: flex; justify-content: center;">
                <div class="ai-generator-panel">
                    <div class="panel-content">
                        <i class="fas fa-wand-magic-sparkles" style="font-size: 2.5rem; color: #a855f7; margin-bottom: 1rem;"></i>
                        <h2 style="color: white; margin-bottom: 0.5rem; font-size: 1.5rem;">Generate Custom Lesson</h2>
                        <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">Curious about something specific? Ask AI to generate a bite-sized lesson just for you.</p>
                        
                        <input type="text" id="ai-interest" class="ai-input" placeholder="E.g., Crypto, Dropshipping, Saving for college...">
                        
                        <button id="generate-btn" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">
                            Generate For Me
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await API.learning.getPath();
                renderStats(response.gamification);
                renderPath(response.path);
            } catch (err) {
                console.error(err);
                alert("Could not load learning path.");
            }

            document.getElementById('generate-btn').addEventListener('click', async () => {
                const interest = document.getElementById('ai-interest').value.trim();
                const btn = document.getElementById('generate-btn');
                
                if (!interest) {
                    alert('Please enter a topic you are interested in!');
                    return;
                }
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
                btn.disabled = true;
                
                try {
                    const aiLesson = await API.learning.generateLesson({ interest: interest, skill_level: "Beginner" });
                    
                    // We generate dynamic AI lessons, store it temporarily in sessionStorage and navigate
                    sessionStorage.setItem('ai_lesson_temp', JSON.stringify(aiLesson));
                    window.location.href = '/lessons?id=ai_generated_lesson';
                    
                } catch (err) {
                    console.error(err);
                    alert("Generative AI failed or API key missing.");
                    btn.innerHTML = 'Generate For Me';
                    btn.disabled = false;
                }
            });
        });

        function renderStats(stats) {
            const container = document.getElementById('stats-container');
            container.innerHTML = `
                <div class="stat-item stat-xp"><i class="fas fa-bolt"></i> <span>${stats.xp || 0} XP</span></div>
                <div class="stat-item stat-streak"><i class="fas fa-fire"></i> <span>${stats.current_streak || 0} Days</span></div>
            `;
        }

        function renderPath(tiers) {
            const root = document.getElementById('path-root');
            let html = '<div class="path-line"></div>';

            tiers.forEach((tier, tIndex) => {
                html += `
                    <div class="tier-section">
                        <div class="tier-header">
                            <div class="tier-title">${tier.tier}</div>
                            <div class="tier-desc">${tier.description}</div>
                        </div>
                        <div class="nodes-container">
                `;

                tier.lessons.forEach((lesson, lIndex) => {
                    const globalIndex = tIndex * 10 + lIndex;
                    const offset = (globalIndex % 2 === 0) ? '40px' : '-40px';
                    const isLocked = lesson.status === 'locked';
                    const classes = `path-node ${lesson.status}`;
                    
                    const clickAction = isLocked ? `alert('Complete previous lessons to unlock!')` : `window.location.href='/lessons?id=${lesson.id}'`;
                    const innerHtml = lesson.status === 'completed' ? `<i class="fas fa-check"></i>` : `<i class="fas ${lesson.icon}"></i>`;

                    html += `
                        <div class="node-wrapper ${lesson.status}">
                            <div class="node-label" style="--tx: ${offset}">${lesson.title}</div>
                            <div class="${classes}" style="--tx: ${offset}" onclick="${clickAction}">
                                ${innerHtml}
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            root.innerHTML = html;
            
            // Adjust offset variables for animations via inline styles
            document.querySelectorAll('.node-wrapper:nth-child(even) .path-node').forEach(el => el.style.setProperty('--tx', '40px'));
            document.querySelectorAll('.node-wrapper:nth-child(odd) .path-node').forEach(el => el.style.setProperty('--tx', '-40px'));
        }
    </script>
</body>
</html>
