<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part-Time Guidance - Teen Finance Guidance</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="nav-bar">
        <div class="logo" style="font-weight: 800; color: var(--primary);">Teen<span
                style="color: #c9973a;">Finance</span></div>
        <div class="nav-links">
            <a href="home.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span>Home</span>
            </a>
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line nav-icon"></i>
                <span>Dashboard</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user nav-icon"></i>
                <span>Profile</span>
            </a>
            <button id="logout-btn" class="nav-item" style="background:none; border:none; cursor:pointer;">
                <i class="fas fa-sign-out-alt nav-icon"></i>
                <span>Logout</span>
            </button>
        </div>
    </div>

    <main style="padding: 2rem; display: flex; justify-content: center;">
        <div style="width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 1.5rem;">

            <!-- Header -->
            <div class="glass-card animate-fade-in"
                style="background: linear-gradient(135deg, #c9973a, #a07830); color: white; padding: 2rem;">
                <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem;">💼 Part-Time Guidance</h1>
                <p style="opacity: 0.9;">Tell us about yourself and we'll find the best opportunities for you!</p>
            </div>

            <!-- Form Section -->
            <div class="glass-card animate-fade-in" id="form-section">
                <h3 style="margin-bottom: 1.5rem; font-weight: 700;">Tell us about yourself</h3>

                <div class="input-group">
                    <label>How many hours per day can you work?</label>
                    <select id="hours">
                        <option value="">Select hours</option>
                        <option value="1-2">1-2 hours</option>
                        <option value="3-4">3-4 hours</option>
                        <option value="5-6">5-6 hours</option>
                        <option value="7+">7+ hours</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>What are your main skills?</label>
                    <select id="skills">
                        <option value="">Select a skill</option>
                        <option value="coding">Coding / Programming</option>
                        <option value="design">Design / Art</option>
                        <option value="writing">Writing / Editing</option>
                        <option value="teaching">Teaching / Tutoring</option>
                        <option value="marketing">Marketing / Social Media</option>
                        <option value="general">No specific skill yet</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>What are you most interested in?</label>
                    <select id="interests">
                        <option value="">Select an interest</option>
                        <option value="tech">Technology</option>
                        <option value="creative">Creative work</option>
                        <option value="education">Education</option>
                        <option value="business">Business</option>
                        <option value="flexible">Anything flexible</option>
                    </select>
                </div>

                <div id="form-error"
                    style="color: var(--error); font-size: 0.9rem; margin-bottom: 1rem; display: none;">Please fill in
                    all fields!</div>
                <button class="btn btn-primary" style="width: 100%;" onclick="getRecommendations()">Find Opportunities
                    →</button>
            </div>

            <!-- Results Section -->
            <div id="results-section" style="display: none;">
                <h3 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem;">🎯 Recommended for You</h3>
                <div id="options-container" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>

            <!-- Roadmap Section -->
            <div id="roadmap-section" style="display: none;">
                <h3 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem;">🗺️ Your Roadmap</h3>
                <div id="roadmap-container" style="display: flex; flex-direction: column; gap: 1rem;"></div>
                <button class="btn btn-secondary" style="width: 100%; margin-top: 1rem;" onclick="resetForm()">← Try
                    Another Option</button>
            </div>

        </div>
    </main>

    <script src="../js/api.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'login.html';

        const opportunities = {
            coding: [
                { title: "Freelance Web Developer", icon: "💻", desc: "Build websites for local businesses and startups.", earn: "₹500-2000/project" },
                { title: "App Developer", icon: "📱", desc: "Create mobile apps and sell or freelance.", earn: "₹1000-5000/project" },
                { title: "Tech Tutor", icon: "👨‍🏫", desc: "Teach coding to beginners online.", earn: "₹200-500/hour" }
            ],
            design: [
                { title: "Graphic Designer", icon: "🎨", desc: "Design logos, posters and social media content.", earn: "₹300-1500/project" },
                { title: "UI/UX Designer", icon: "✏️", desc: "Design app interfaces for startups.", earn: "₹500-3000/project" },
                { title: "Video Editor", icon: "🎬", desc: "Edit videos for YouTubers and businesses.", earn: "₹300-1000/video" }
            ],
            writing: [
                { title: "Content Writer", icon: "✍️", desc: "Write blogs and articles for websites.", earn: "₹200-800/article" },
                { title: "Copywriter", icon: "📝", desc: "Write marketing copy for businesses.", earn: "₹500-2000/project" },
                { title: "Proofreader", icon: "🔍", desc: "Proofread documents and academic papers.", earn: "₹150-500/hour" }
            ],
            teaching: [
                { title: "Online Tutor", icon: "📚", desc: "Tutor students in subjects you excel at.", earn: "₹200-500/hour" },
                { title: "Course Creator", icon: "🎓", desc: "Create and sell online courses.", earn: "₹2000-20000/course" },
                { title: "Skill Trainer", icon: "🏋️", desc: "Train others in your area of expertise.", earn: "₹300-800/session" }
            ],
            marketing: [
                { title: "Social Media Manager", icon: "📱", desc: "Manage social accounts for small businesses.", earn: "₹3000-8000/month" },
                { title: "Influencer / Content Creator", icon: "🌟", desc: "Build your personal brand and monetize.", earn: "Varies" },
                { title: "Digital Marketer", icon: "📊", desc: "Run ads and campaigns for businesses.", earn: "₹500-2000/project" }
            ],
            general: [
                { title: "Virtual Assistant", icon: "💼", desc: "Help businesses with admin and organizational tasks.", earn: "₹200-400/hour" },
                { title: "Data Entry Specialist", icon: "⌨️", desc: "Handle data entry tasks for companies.", earn: "₹150-300/hour" },
                { title: "Customer Support", icon: "🎧", desc: "Work remotely as customer support agent.", earn: "₹8000-15000/month" }
            ]
        };

        const roadmaps = {
            "Freelance Web Developer": [
                { step: 1, title: "Learn the Basics", desc: "Start with HTML, CSS and JavaScript. Use free resources like freeCodeCamp or YouTube.", icon: "📖" },
                { step: 2, title: "Build 3 Projects", desc: "Create a portfolio website, a landing page and a simple web app to showcase your skills.", icon: "🛠️" },
                { step: 3, title: "Create Your Portfolio", desc: "Put your projects on GitHub and build a personal portfolio website.", icon: "🌐" },
                { step: 4, title: "Find Your First Client", desc: "Join Fiverr, Upwork or reach out to local businesses. Offer discounted rates initially.", icon: "🤝" },
                { step: 5, title: "Deliver & Get Reviews", desc: "Complete projects professionally, ask for reviews and build your reputation.", icon: "⭐" }
            ],
            "Graphic Designer": [
                { step: 1, title: "Learn Design Tools", desc: "Start with Canva (free) then move to Adobe Illustrator or Figma.", icon: "🎨" },
                { step: 2, title: "Study Design Principles", desc: "Learn about color theory, typography and layout through YouTube or Coursera.", icon: "📖" },
                { step: 3, title: "Build a Portfolio", desc: "Create 5-10 sample designs: logos, posters, social media posts.", icon: "🖼️" },
                { step: 4, title: "Join Freelance Platforms", desc: "Sign up on Fiverr, 99designs or reach out to local businesses.", icon: "💼" },
                { step: 5, title: "Grow Your Client Base", desc: "Ask for referrals, post your work on Instagram and Behance.", icon: "📈" }
            ],
            "Content Writer": [
                { step: 1, title: "Pick Your Niche", desc: "Choose topics you know well — tech, finance, health, lifestyle etc.", icon: "✍️" },
                { step: 2, title: "Practice Writing Daily", desc: "Write 300-500 words every day to improve your style and speed.", icon: "📝" },
                { step: 3, title: "Build a Writing Portfolio", desc: "Create 3-5 sample articles on your chosen niche.", icon: "📂" },
                { step: 4, title: "Find Writing Gigs", desc: "Join ProBlogger, Fiverr, LinkedIn or approach blogs directly.", icon: "🔍" },
                { step: 5, title: "Scale Up", desc: "Increase your rates as you build experience and testimonials.", icon: "🚀" }
            ],
            "Online Tutor": [
                { step: 1, title: "Pick Your Subject", desc: "Choose a subject you are confident in — math, science, English etc.", icon: "📚" },
                { step: 2, title: "Set Up Your Space", desc: "Get a quiet space, good lighting and a working mic/camera.", icon: "🎙️" },
                { step: 3, title: "Join Tutoring Platforms", desc: "Sign up on Chegg, Tutor.com, Vedantu or Superprof.", icon: "💻" },
                { step: 4, title: "Promote Yourself", desc: "Spread the word in school/college groups and local community.", icon: "📣" },
                { step: 5, title: "Build Regular Students", desc: "Focus on results, ask for referrals and build a loyal student base.", icon: "⭐" }
            ],
            "Social Media Manager": [
                { step: 1, title: "Learn Social Media Strategy", desc: "Study how Instagram, LinkedIn and Facebook algorithms work.", icon: "📱" },
                { step: 2, title: "Practice on Your Own Accounts", desc: "Build your own social presence as proof of your skills.", icon: "🌟" },
                { step: 3, title: "Learn Basic Design & Copywriting", desc: "Use Canva for visuals and learn to write engaging captions.", icon: "✏️" },
                { step: 4, title: "Find Your First Client", desc: "Offer free management for 1 month to a local business to get experience.", icon: "🤝" },
                { step: 5, title: "Scale to Multiple Clients", desc: "Use your results as case studies to attract paying clients.", icon: "📈" }
            ],
            "Virtual Assistant": [
                { step: 1, title: "Learn Essential Tools", desc: "Get comfortable with Google Workspace, Trello, Slack and Zoom.", icon: "🛠️" },
                { step: 2, title: "List Your Services", desc: "Decide what you offer: email management, scheduling, data entry etc.", icon: "📋" },
                { step: 3, title: "Create a Profile", desc: "Sign up on Fiverr, Upwork or Freelancer with a clear description.", icon: "👤" },
                { step: 4, title: "Apply for Jobs", desc: "Apply to VA job postings on LinkedIn and VA Facebook groups.", icon: "📨" },
                { step: 5, title: "Deliver & Get Testimonials", desc: "Be reliable, meet deadlines and ask happy clients for reviews.", icon: "⭐" }
            ]
        };
        const platforms = {
            "Learn the Basics": [
                { name: "freeCodeCamp", url: "https://www.freecodecamp.org", icon: "🆓", desc: "Free coding courses" },
                { name: "The Odin Project", url: "https://www.theodinproject.com", icon: "🔗", desc: "Free full-stack curriculum" },
                { name: "YouTube - Traversy Media", url: "https://www.youtube.com/@TraversyMedia", icon: "▶️", desc: "Free video tutorials" }
            ],
            "Build 3 Projects": [
                { name: "GitHub", url: "https://github.com", icon: "💻", desc: "Host your projects here" },
                { name: "CodePen", url: "https://codepen.io", icon: "✏️", desc: "Build & share front-end projects" }
            ],
            "Create Your Portfolio": [
                { name: "GitHub Pages", url: "https://pages.github.com", icon: "🌐", desc: "Free portfolio hosting" },
                { name: "Netlify", url: "https://netlify.com", icon: "🚀", desc: "Deploy your site for free" }
            ],
            "Find Your First Client": [
                { name: "Fiverr", url: "https://www.fiverr.com", icon: "💼", desc: "Freelance marketplace" },
                { name: "Upwork", url: "https://www.upwork.com", icon: "🤝", desc: "Professional freelancing" }
            ],
            "Learn Design Tools": [
                { name: "Canva", url: "https://www.canva.com", icon: "🎨", desc: "Free design tool for beginners" },
                { name: "Figma", url: "https://www.figma.com", icon: "✏️", desc: "Free UI/UX design tool" },
                { name: "Adobe Express", url: "https://www.adobe.com/express", icon: "🖌️", desc: "Quick graphic design" }
            ],
            "Study Design Principles": [
                { name: "Coursera - Design", url: "https://www.coursera.org/search?query=graphic+design", icon: "📖", desc: "Free design courses" },
                { name: "YouTube - Design Theory", url: "https://www.youtube.com/results?search_query=design+principles", icon: "▶️", desc: "Free video tutorials" }
            ],
            "Build a Portfolio": [
                { name: "Behance", url: "https://www.behance.net", icon: "🖼️", desc: "Showcase your design work" },
                { name: "Dribbble", url: "https://dribbble.com", icon: "🎯", desc: "Design community & portfolio" }
            ],
            "Join Freelance Platforms": [
                { name: "Fiverr", url: "https://www.fiverr.com", icon: "💼", desc: "Sell your services" },
                { name: "99designs", url: "https://99designs.com", icon: "🎨", desc: "Design-specific platform" }
            ],
            "Pick Your Niche": [
                { name: "Google Trends", url: "https://trends.google.com", icon: "📊", desc: "Find trending topics" },
                { name: "Medium", url: "https://medium.com", icon: "✍️", desc: "Read & publish articles" }
            ],
            "Practice Writing Daily": [
                { name: "Hemingway Editor", url: "https://hemingwayapp.com", icon: "📝", desc: "Improve your writing clarity" },
                { name: "Grammarly", url: "https://www.grammarly.com", icon: "✅", desc: "Free grammar checker" }
            ],
            "Find Writing Gigs": [
                { name: "ProBlogger", url: "https://problogger.com/jobs", icon: "🔍", desc: "Writing job board" },
                { name: "Fiverr", url: "https://www.fiverr.com", icon: "💼", desc: "Freelance writing gigs" },
                { name: "LinkedIn", url: "https://www.linkedin.com", icon: "🤝", desc: "Professional network" }
            ],
            "Join Tutoring Platforms": [
                { name: "Vedantu", url: "https://www.vedantu.com", icon: "📚", desc: "Online tutoring platform" },
                { name: "Chegg", url: "https://www.chegg.com/tutors", icon: "🎓", desc: "Tutor students online" },
                { name: "Superprof", url: "https://www.superprof.co.in", icon: "👨‍🏫", desc: "Find tutoring students" }
            ],
            "Learn Social Media Strategy": [
                { name: "HubSpot Academy", url: "https://academy.hubspot.com", icon: "📱", desc: "Free social media courses" },
                { name: "Meta Blueprint", url: "https://www.facebook.com/business/learn", icon: "📘", desc: "Free Facebook & Instagram courses" }
            ],
            "Learn Essential Tools": [
                { name: "Google Workspace", url: "https://workspace.google.com", icon: "🛠️", desc: "Docs, Sheets, Gmail" },
                { name: "Trello", url: "https://trello.com", icon: "📋", desc: "Free project management" },
                { name: "Notion", url: "https://www.notion.so", icon: "📓", desc: "Free productivity tool" }
            ],
            "Apply for Jobs": [
                { name: "LinkedIn", url: "https://www.linkedin.com", icon: "🤝", desc: "Professional job network" },
                { name: "Upwork", url: "https://www.upwork.com", icon: "💼", desc: "Remote job marketplace" },
                { name: "Fiverr", url: "https://www.fiverr.com", icon: "🌟", desc: "Freelance marketplace" }
            ]
        };
        function getRecommendations() {
            const hours = document.getElementById('hours').value;
            const skills = document.getElementById('skills').value;
            const interests = document.getElementById('interests').value;
            const errorEl = document.getElementById('form-error');

            if (!hours || !skills || !interests) {
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';

            const options = opportunities[skills] || opportunities['general'];

            const resultsSection = document.getElementById('results-section');
            const optionsContainer = document.getElementById('options-container');
            resultsSection.style.display = 'block';

            optionsContainer.innerHTML = options.map((opt, i) => `
                <div class="glass-card" style="display: flex; align-items: center; gap: 1.5rem; padding: 1.5rem; cursor: pointer; border: 2px solid var(--border); transition: all 0.2s ease;"
                    onmouseover="this.style.borderColor='var(--primary)'"
                    onmouseout="this.style.borderColor='var(--border)'"
                    onclick="showRoadmap('${opt.title}')">
                    <div style="font-size: 2.5rem; flex-shrink: 0;">${opt.icon}</div>
                    <div style="flex: 1;">
                        <h4 style="font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem;">${opt.title}</h4>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">${opt.desc}</p>
                        <span style="font-size: 0.8rem; background: #f0ebff; color: var(--primary); padding: 0.2rem 0.8rem; border-radius: 20px; font-weight: 600;">💰 ${opt.earn}</span>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--text-muted);"></i>
                </div>
            `).join('');

            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function showRoadmap(title) {
            const steps = roadmaps[title] || roadmaps["Virtual Assistant"];
            const roadmapSection = document.getElementById('roadmap-section');
            const roadmapContainer = document.getElementById('roadmap-container');

            roadmapSection.style.display = 'block';
            roadmapContainer.innerHTML = `
                <div class="glass-card" style="background: linear-gradient(135deg, #c9973a, #a07830); color: white; padding: 1.5rem; margin-bottom: 0.5rem;">
                    <h3 style="font-size: 1.2rem; font-weight: 800;">Your Path to: ${title}</h3>
                    <p style="opacity: 0.9; font-size: 0.9rem; margin-top: 0.3rem;">Follow these steps to get started!</p>
                </div>
                ${steps.map(step => {
                const stepPlatforms = platforms[step.title] || [];
                const platformsHTML = stepPlatforms.length > 0 ? `
                        <div id="platforms-${step.step}" style="display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                            <p style="font-size: 0.8rem; font-weight: 700; color: var(--primary); margin-bottom: 0.8rem;">📌 Where to learn / get started:</p>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                ${stepPlatforms.map(p => `
                                    <a href="${p.url}" target="_blank" style="
                                        display: flex; align-items: center; gap: 0.8rem;
                                        padding: 0.7rem 1rem; border-radius: 8px;
                                        background: #f7fafc; border: 1px solid var(--border);
                                        text-decoration: none; color: var(--text-main);
                                        transition: all 0.2s ease;"
                                        onmouseover="this.style.background='#ede9fe'; this.style.borderColor='var(--primary)'"
                                        onmouseout="this.style.background='#f7fafc'; this.style.borderColor='var(--border)'">
                                        <span style="font-size: 1.2rem;">${p.icon}</span>
                                        <div>
                                            <div style="font-weight: 600; font-size: 0.88rem;">${p.name}</div>
                                            <div style="font-size: 0.78rem; color: var(--text-muted);">${p.desc}</div>
                                        </div>
                                        <i class="fas fa-external-link-alt" style="margin-left: auto; color: var(--text-muted); font-size: 0.75rem;"></i>
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    ` : '';

                return `
                        <div class="glass-card animate-fade-in" style="padding: 1.2rem; cursor: ${stepPlatforms.length > 0 ? 'pointer' : 'default'};"
                            onclick="${stepPlatforms.length > 0 ? `togglePlatforms(${step.step})` : ''}">
                            <div style="display: flex; gap: 1.2rem; align-items: flex-start;">
                                <div style="width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; flex-shrink: 0;">
                                    ${step.step}
                                </div>
                                <div style="flex: 1;">
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <div style="font-size: 1.3rem; margin-bottom: 0.3rem;">${step.icon}</div>
                                        ${stepPlatforms.length > 0 ? `<span style="font-size: 0.75rem; color: var(--primary); font-weight: 600;">Tap to see resources ▼</span>` : ''}
                                    </div>
                                    <h4 style="font-weight: 700; font-size: 0.95rem; margin-bottom: 0.3rem;">${step.title}</h4>
                                    <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.6;">${step.desc}</p>
                                    ${platformsHTML}
                                </div>
                            </div>
                        </div>
                    `;
            }).join('')}
            `;

            roadmapSection.scrollIntoView({ behavior: 'smooth' });
        }
        function togglePlatforms(stepNum) {
            const el = document.getElementById(`platforms-${stepNum}`);
            if (el) {
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        }
        function resetForm() {
            document.getElementById('roadmap-section').style.display = 'none';
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('hours').value = '';
            document.getElementById('skills').value = '';
            document.getElementById('interests').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await API.auth.logout();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
