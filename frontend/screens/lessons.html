<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson - Teen Finance Guidance</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
            position: sticky;
            top: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .lesson-topic-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-in-out;
        }

        .lesson-topic-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .quiz-option {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.8rem;
        }

        .quiz-option:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .quiz-option.correct {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
            color: #4ade80;
        }

        .quiz-option.wrong {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #f87171;
        }

        input[type="radio"] {
            display: none;
        }

        #xp-overlay {
            position: fixed;
            top: 0; left:0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            backdrop-filter: blur(10px);
        }

        .xp-gem {
            font-size: 6rem;
            color: #f59e0b;
            text-shadow: 0 0 40px rgba(245, 158, 11, 0.6);
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #xp-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        #xp-overlay.active .xp-gem {
            transform: scale(1);
        }
    </style>
</head>

<body>
    <nav class="nav-bar">
        <div class="logo" onclick="window.location.href='/learning_path'">
            <i class="fas fa-rocket"></i>
            Teen<span>Finance</span>
        </div>
        <a href="/learning_path" class="btn btn-secondary btn-sm" style="text-decoration: none;">
            <i class="fas fa-times"></i> End Lesson
        </a>
    </nav>

    <main class="layout-container" style="display: flex; justify-content: center; padding-bottom: 5rem;">
        <div style="width: 100%; max-width: 700px;">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>

            <div id="lesson-header" style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-graduation-cap" style="font-size: 3rem; color: #a855f7; margin-bottom: 1rem;"></i>
                <h1 id="lesson-title" style="font-size: 2.2rem; font-weight: 800; color: white;">Loading...</h1>
            </div>

            <div id="lesson-content">
                <!-- Topics injected dynamically -->
            </div>

            <div id="quiz-section" style="display: none; margin-top: 3rem;">
                <h2 style="font-size: 1.8rem; color: white; margin-bottom: 1rem; text-align: center;"><i class="fas fa-brain"></i> Knowledge Check</h2>
                <div id="quiz-container">
                    <!-- Quizzes injected here -->
                </div>
                
                <button id="submit-quiz" class="btn btn-primary" style="width: 100%; margin-top: 2rem; font-size: 1.1rem; padding: 1.2rem; display: none;">Check Answers</button>
            </div>
            
            <button id="continue-btn" class="btn btn-primary" style="width: 100%; margin-top: 2rem; font-size: 1.1rem; padding: 1.2rem; display: none;">Continue</button>

        </div>
    </main>

    <!-- XP Reward Overlay -->
    <div id="xp-overlay">
        <i class="fas fa-gem xp-gem"></i>
        <h1 style="color: white; font-size: 3rem; margin: 1rem 0 0.5rem 0;" id="xp-text">+50 XP</h1>
        <p style="color: #cbd5e1; font-size: 1.2rem; margin-bottom: 2rem;">Lesson Complete!</p>
        <button class="btn btn-primary" onclick="window.location.href='/learning_path'" style="padding: 1rem 3rem; font-size: 1.2rem;">Continue Path</button>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id');
        let currentLesson = null;
        let visibleSections = 0;
        let totalSections = 0;

        async function loadLesson() {
            if (lessonId === 'ai_generated_lesson') {
                const tempStr = sessionStorage.getItem('ai_lesson_temp');
                if (tempStr) {
                    currentLesson = JSON.parse(tempStr);
                } else {
                    alert("AI lesson data lost. Returning to path.");
                    window.location.href = '/learning_path';
                    return;
                }
            } else {
                try {
                    currentLesson = await API.recommendation.getLesson(lessonId);
                } catch (err) {
                    console.error(err);
                    alert("Failed to load lesson.");
                    window.location.href = '/learning_path';
                    return;
                }
            }

            document.getElementById('lesson-title').textContent = currentLesson.title;
            const contentDiv = document.getElementById('lesson-content');
            totalSections = currentLesson.topics.length + 1; // +1 for the quiz

            currentLesson.topics.forEach((topic, idx) => {
                const div = document.createElement('div');
                div.className = 'lesson-topic-card';
                div.id = `section-${idx}`;
                div.innerHTML = `
                    <h3 style="color: #3b82f6; font-size: 1.3rem; margin-bottom: 1rem;"><i class="fas fa-book-open" style="margin-right: 8px;"></i>${topic.title}</h3>
                    <p style="color: #e2e8f0; line-height: 1.7; font-size: 1.05rem;">${topic.content.replace(/\n/g, '<br>')}</p>
                `;
                contentDiv.appendChild(div);
            });

            renderQuiz();

            // Setup scrolling/continue logic
            document.getElementById('continue-btn').style.display = 'block';
            showNextSection();
        }

        function showNextSection() {
            if (visibleSections < currentLesson.topics.length) {
                document.getElementById(`section-${visibleSections}`).classList.add('visible');
                visibleSections++;
                updateProgress();
                
                if (visibleSections === currentLesson.topics.length) {
                    document.getElementById('continue-btn').textContent = "Start Quiz";
                }
            } else {
                document.getElementById('continue-btn').style.display = 'none';
                document.getElementById('quiz-section').style.display = 'block';
                document.getElementById('submit-quiz').style.display = 'block';
                visibleSections++;
                updateProgress();
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function updateProgress() {
            const pct = (visibleSections / totalSections) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        document.getElementById('continue-btn').addEventListener('click', showNextSection);

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = currentLesson.quiz.map((q, qIndex) => `
                <div class="lesson-topic-card visible" style="margin-bottom: 1.5rem;" id="quiz-block-${qIndex}">
                    <p style="margin-bottom: 1rem; font-weight: 600; font-size: 1.1rem; color: white;">${q.q}</p>
                    <div style="display: flex; flex-direction: column;">
                        ${q.a.map((opt, oIndex) => `
                            <label class="quiz-option" id="opt-${qIndex}-${oIndex}" onclick="selectOption(${qIndex}, ${oIndex})">
                                <input type="radio" name="q${qIndex}" value="${oIndex}">
                                <div style="width: 20px; height: 20px; border-radius: 50%; border: 2px solid #cbd5e1; display:flex; align-items:center; justify-content:center;" class="radio-circle"></div>
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.selectOption = function(qIndex, oIndex) {
            // Remove selection from others
            document.querySelectorAll(`input[name="q${qIndex}"]`).forEach(input => {
                const parent = input.closest('.quiz-option');
                parent.style.borderColor = 'transparent';
                parent.style.background = 'rgba(255,255,255,0.05)';
                parent.querySelector('.radio-circle').style.background = 'transparent';
            });
            
            // Highlight selected
            const selected = document.getElementById(`opt-${qIndex}-${oIndex}`);
            selected.style.borderColor = '#a855f7';
            selected.style.background = 'rgba(168, 85, 247, 0.1)';
            selected.querySelector('.radio-circle').style.background = '#a855f7';
        }

        document.getElementById('submit-quiz').addEventListener('click', async () => {
            const answers = currentLesson.quiz.map((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                return selected ? parseInt(selected.value) : null;
            });

            if (answers.includes(null)) {
                alert('Please answer all questions!');
                return;
            }

            let correctCount = 0;
            answers.forEach((ans, i) => {
                const correct = currentLesson.quiz[i].correct;
                const optionDiv = document.getElementById(`opt-${i}-${ans}`);
                if (ans === correct) {
                    correctCount++;
                    optionDiv.classList.add('correct');
                    optionDiv.innerHTML += ' <i class="fas fa-check" style="margin-left:auto;"></i>';
                } else {
                    optionDiv.classList.add('wrong');
                    optionDiv.innerHTML += ' <i class="fas fa-times" style="margin-left:auto;"></i>';
                    // Highlight correct one
                    const correctDiv = document.getElementById(`opt-${i}-${correct}`);
                    correctDiv.classList.add('correct');
                }
            });

            document.getElementById('submit-quiz').style.display = 'none';

            const score = Math.round((correctCount / currentLesson.quiz.length) * 100);

            setTimeout(async () => {
                if (score >= 50) { // Duolingo is forgiving, you just need mostly right or passing
                    try {
                        let res;
                        if (lessonId !== 'ai_generated_lesson') {
                            res = await API.learning.completeLesson({ module_name: lessonId, score: score });
                        } else {
                            // Dummy complete for AI lesson logic so user gets XP
                            res = await API.learning.completeLesson({ module_name: "ai_bonus", score: score });
                        }
                        
                        document.getElementById('xp-text').textContent = `+${res.earned_xp || 50} XP`;
                        document.getElementById('xp-overlay').classList.add('active');
                        // Celebrate!
                    } catch (err) {
                        console.error(err);
                        alert('Could not sync progress, but lesson is done!');
                        document.getElementById('xp-overlay').classList.add('active');
                    }
                } else {
                    alert(`You scored ${score}%. Review the details and try again!`);
                    document.getElementById('continue-btn').style.display = 'block';
                    document.getElementById('continue-btn').textContent = "Retry Quiz";
                    document.getElementById('continue-btn').onclick = () => location.reload();
                }
            }, 1500);
        });

        loadLesson();
    </script>
</body>
</html>
